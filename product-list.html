<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Tất cả sản phẩm - PhucKhang Sport Shop</title>
  <link rel="stylesheet" href="style/style2.css">
</head>
<body>
  <header>
    <h1>Sản Phẩm</h1>
    <div><a href="index.html" style="color:#fff;">⬅ Quay lại mua hàng</a></div>
  </header>

  <div class="cart-container">

  <div class="filters">
    <select id="categoryFilter">
      <option value="">--Phân loại--</option>
      <option value="giay">Giày</option>
      <option value="ao">Áo</option>
      <option value="phukien">Phụ kiện</option>
      <option value="vo_phuc">Võ Phục</option>
    </select>

    <select id="priceFilter">
      <option value="">--Giá tiền--</option>
      <option value="low">Dưới 500k</option>
      <option value="mid">500k - 1tr</option>
      <option value="high">Trên 1tr</option>
    </select>

    <select id="stockFilter">
      <option value="">--Tình trạng--</option>
      <option value="true">Còn hàng</option>
      <option value="false">Hết hàng</option>
    </select>
  </div>

  <section class="products" id="productList"></section>

<script>
  async function loadProducts() {
    const res = await fetch("https://phuckhang-sport.up.railway.app/products");
    let products = await res.json();

    // lấy giá trị filter
    const category = document.getElementById("categoryFilter").value;
    const price = document.getElementById("priceFilter").value;
    const stock = document.getElementById("stockFilter").value;

    // lọc dữ liệu
    products = products.filter(p => {
      let ok = true;
      if (category && p.category !== category) ok = false;
      if (price === "low" && p.price >= 500000) ok = false;
      if (price === "mid" && (p.price < 500000 || p.price > 1000000)) ok = false;
      if (price === "high" && p.price <= 1000000) ok = false;
      if (stock && String(p.inStock) !== stock) ok = false;
      return ok;
    });

    // render
    const list = document.getElementById("productList");
    list.innerHTML = "";
    products.forEach(p => {
      const card = document.createElement("div");
      card.className = "product-card";
      card.innerHTML = `
        <img src="${p.img}" alt="${p.name}">
        <div>
          <h3>${p.name}</h3>
          <p>Giá: ${p.price.toLocaleString()}đ</p>
          <p>Tình trạng: ${p.inStock ? "Còn hàng" : "Hết hàng"}</p>
          <p>Loại: ${p.category}</p>
        </div>
      `;
      list.appendChild(card);
    });
  }

  document.querySelectorAll(".filters select").forEach(sel => {
    sel.addEventListener("change", loadProducts);
  });

  loadProducts();
</script>
</body>
</html>
